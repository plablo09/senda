services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      LLM_MODEL: ${LLM_MODEL:-ollama/llama3.2}
      LLM_API_BASE: ${LLM_API_BASE:-http://ollama:11434}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - db
      - redis
      - minio
      - ollama
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      LLM_MODEL: ${LLM_MODEL:-ollama/llama3.2}
      LLM_API_BASE: ${LLM_API_BASE:-http://ollama:11434}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: senda
      POSTGRES_USER: senda
      POSTGRES_PASSWORD: senda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: senda
      MINIO_ROOT_PASSWORD: senda_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  exec-python:
    build:
      context: .
      dockerfile: docker/Dockerfile.python-geo
    command: sleep infinity
    labels:
      senda.exec: "true"
      senda.language: "python"
    deploy:
      replicas: 2

  exec-r:
    build:
      context: .
      dockerfile: docker/Dockerfile.r-geo
    command: sleep infinity
    labels:
      senda.exec: "true"
      senda.language: "r"
    deploy:
      replicas: 2

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: sh -c "ollama serve & sleep 5 && ollama pull llama3.2 && wait"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ollama_data:
