services:
  migrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      LLM_MODEL: ${LLM_MODEL:-gemini/gemini-2.0-flash}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      LLM_MODEL: ${LLM_MODEL:-gemini/gemini-2.0-flash}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: senda
      POSTGRES_USER: senda
      POSTGRES_PASSWORD: senda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senda -d senda"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: senda
      MINIO_ROOT_PASSWORD: senda_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  exec-python:
    build:
      context: .
      dockerfile: docker/Dockerfile.python-geo
    command: sleep infinity
    labels:
      senda.exec: "true"
      senda.language: "python"
    deploy:
      replicas: 2

  exec-r:
    build:
      context: .
      dockerfile: docker/Dockerfile.r-geo
    command: sleep infinity
    labels:
      senda.exec: "true"
      senda.language: "r"
    deploy:
      replicas: 2

  ollama:
    profiles: [ollama]
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: sh -c "ollama serve & sleep 5 && ollama pull llama3.2 && wait"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  frontend_node_modules:
